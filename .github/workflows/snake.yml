name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"  # Executa diariamente à meia-noite
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v2

      - name: Gerar animação da cobra
        uses: Platane/snk@v2  # 👈 Usando a versão 2, que aceita personalização
        with:
          github_user_name: Nicolas-RM1
          svg_out_path: dist/github-contribution-grid-snake.svg
          color_snake: "#00ffff"  # Azul neon
          color_dots: "#9f00ff,#7c00c9,#5a0096,#3d0066,#200033"  # Tons de roxo

      - name: Publicar no branch output
        uses: crazy-max/ghaction-github-pages@v2
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
